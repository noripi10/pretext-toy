<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>基本的な高さ計算 — pretext</title>
    <script type="module" src="/src/samples/basic/main.ts"></script>
  </head>
  <body>
    <div class="page">
      <a href="/pretext-toy" class="back">← サンプル一覧</a>
      <h1>基本的な高さ計算</h1>
      <p class="subtitle">
        <code>prepare()</code> + <code>layout()</code> でDOMリフローなしにテキスト高さを計測します。
      </p>

      <div class="card">
        <h2>テキスト入力</h2>
        <label for="text-input">テキスト</label>
        <textarea id="text-input" rows="4">
The quick brown fox jumps over the lazy dog. 素早い茶色のキツネが怠惰な犬を飛び越えます。🦊</textarea
        >

        <label for="font-select" style="margin-top: 16px">フォント</label>
        <select id="font-select">
          <option value="16px system-ui">16px system-ui</option>
          <option value="14px system-ui">14px system-ui</option>
          <option value="20px system-ui">20px system-ui</option>
          <option value="16px Georgia, serif">16px Georgia</option>
          <option value="16px monospace">16px monospace</option>
        </select>

        <label for="width-slider" style="margin-top: 16px"> コンテナ幅: <strong id="width-label">400px</strong> </label>
        <input type="range" id="width-slider" min="100" max="800" value="400" />
      </div>

      <div class="card">
        <h2>計測結果</h2>
        <div id="preview-container">
          <div id="preview-text"></div>
        </div>
        <div class="stat-row" id="stats"></div>
      </div>

      <div class="card">
        <h2>パフォーマンス比較</h2>
        <p style="font-size: 14px; margin-bottom: 16px">同じテキスト 500個を繰り返し計測したときの処理時間です。</p>
        <button id="bench-btn">ベンチマーク実行</button>
        <div class="stat-row" id="bench-stats" style="margin-top: 16px"></div>
      </div>
    </div>
  </body>
</html>
