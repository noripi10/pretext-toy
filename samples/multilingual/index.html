  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多言語レイアウト — pretext</title>
    <script type="module" src="/src/samples/multilingual/main.ts"></script>

  <body>
    <div class="page">
      <a href="/pretext-toy" class="back">← サンプル一覧</a>
      <h1>多言語レイアウト</h1>

      <div class="card">
